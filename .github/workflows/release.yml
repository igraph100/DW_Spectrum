name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-zip:
    name: Build and attach DW_Spectrum.zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          cd custom_components/dw_spectrum
          zip -r "$GITHUB_WORKSPACE/DW_Spectrum.zip" .

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: DW_Spectrum.zip
